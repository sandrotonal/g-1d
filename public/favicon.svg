<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00B8D4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="#0e0e0f"/>
  
  <!-- Outer Ring -->
  <circle cx="50" cy="50" r="45" fill="none" stroke="url(#gradient)" stroke-width="2" opacity="0.3"/>
  
  <!-- Inner Hexagon/Arc Design -->
  <path d="M 50 20 L 75 35 L 75 65 L 50 80 L 25 65 L 25 35 Z" fill="none" stroke="url(#gradient)" stroke-width="2.5" opacity="0.8"/>
  
  <!-- Center Dot -->
  <circle cx="50" cy="50" r="8" fill="url(#gradient)"/>
  
  <!-- Orbit Ring -->
  <ellipse cx="50" cy="50" rx="35" ry="12" fill="none" stroke="url(#gradient)" stroke-width="1.5" opacity="0.4" transform="rotate(-45 50 50)"/>
</svg>
